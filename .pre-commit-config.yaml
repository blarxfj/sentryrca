repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict
        entry: uv run mypy --strict
        language: system
        types: [python]
        pass_filenames: true

      - id: pytest-unit
        name: pytest unit tests
        entry: uv run pytest tests/unit/ tests/schema/ -q --no-header
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-schema-examples
        name: validate RCA schema examples
        entry: uv run python -m sentryrca.schema.validate_examples
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: .env.example
